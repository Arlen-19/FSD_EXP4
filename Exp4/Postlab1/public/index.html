<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
</head>
<body>

    <h2>Student Form</h2>

    <form action="/submit" method="POST">

        <input type="text" name="name"><br><br>

        <label>Branch:</label><br>
        <input type="text" name="branch"><br><br>

        <label>Year:</label><br>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
